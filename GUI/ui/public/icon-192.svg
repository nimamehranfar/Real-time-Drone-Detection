<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="drone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <g transform="translate(96,96)">
    <!-- Drone body -->
    <ellipse cx="0" cy="0" rx="20" ry="10" fill="url(#drone)"/>
    <!-- Propellers -->
    <circle cx="-40" cy="-20" r="18" fill="none" stroke="url(#drone)" stroke-width="3"/>
    <circle cx="40" cy="-20" r="18" fill="none" stroke="url(#drone)" stroke-width="3"/>
    <circle cx="-40" cy="20" r="18" fill="none" stroke="url(#drone)" stroke-width="3"/>
    <circle cx="40" cy="20" r="18" fill="none" stroke="url(#drone)" stroke-width="3"/>
    <!-- Arms -->
    <line x1="-15" y1="-8" x2="-35" y2="-18" stroke="url(#drone)" stroke-width="4"/>
    <line x1="15" y1="-8" x2="35" y2="-18" stroke="url(#drone)" stroke-width="4"/>
    <line x1="-15" y1="8" x2="-35" y2="18" stroke="url(#drone)" stroke-width="4"/>
    <line x1="15" y1="8" x2="35" y2="18" stroke="url(#drone)" stroke-width="4"/>
    <!-- Detection ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  </g>
</svg>
